databases:
  # Base de données PostgreSQL
  - name: immosuite-db
    plan: free
    postgresMajorVersion: "15"

services:

  # Serveur Backend (NodeJS)
  - type: web
    name: immosuite-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: immosuite-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # PayTech (mode test recommandé au démarrage)
      - key: PAYTECH_MODE
        value: test
      # Ajoutez ces secrets manuellement dans Render:
      # PAYTECH_API_KEY, PAYTECH_API_SECRET
      # Optionnel: PAYTECH_BASE_URL=https://paytech.sn/api/payment/request-payment
